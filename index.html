<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="陈奕宏的个人主页：LLM Agent、科学计算、数值算法、数学推理与工具化科研流程。">
    <meta name="author" content="Yihong Chen">
    <meta name="keywords" content="陈奕宏, Yihong Chen, LLM Agent, Scientific Computing, Numerical Algorithms, Mathematical Reasoning">
    <meta property="og:type" content="website">
    <meta property="og:title" content="陈奕宏 | Yihong Chen">
    <meta property="og:description" content="陈奕宏的个人主页：LLM Agent、科学计算、数值算法、数学推理与工具化科研流程。">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="陈奕宏 | Yihong Chen">
    <meta name="twitter:description" content="陈奕宏的个人主页：LLM Agent、科学计算、数值算法、数学推理与工具化科研流程。">
    <title></title>
    <!-- 样式统一维护在 css/main.css；发表相关数据维护在 js/publications.js。 -->
    <link rel="stylesheet" href="css/main.css">
    <script src="js/content.js" defer></script>
    <script src="js/publications.js" defer></script>
    <script src="js/main.js" defer></script>
</head>
<body data-page="home">
    <header class="site-header">
        <a class="brand" href="index.html#top" id="brand"></a>
        <!-- 顶部导航：data-nav 对应 content.js 的 nav 键名；href 可指向本页锚点或独立页面。 -->
        <nav class="site-nav" aria-label="Primary navigation">
            <a href="#profile" data-nav="profile"></a>
            <a href="#experience" data-nav="experience"></a>
            <a href="#projects" data-nav="projects"></a>
            <a href="#honors" data-nav="honors"></a>
            <a href="publications.html" data-nav="outputs"></a>
        </nav>
        <div class="header-actions">
            <button class="text-button" id="language-toggle" type="button">En</button>
            <button class="text-button primary" id="cv-button" type="button">简历</button>
        </div>
    </header>

    <main id="top">
        <!-- 首屏：这里保留结构，姓名、简介、标签和个人信息由 JS 按语言填入。 -->
        <section class="hero" aria-labelledby="profile-name">
            <div class="hero-copy">
                <h1 id="profile-name"></h1>
                <p class="lead" id="hero-lead"></p>
                <div class="identity-meta">
                    <ul class="meta-list" id="profile-lines"></ul>
                </div>
                <div class="profile-links" id="profile-links" aria-label="Academic profiles"></div>
                <div class="tag-list" id="hero-tags" aria-label="Focus areas"></div>
            </div>
            <aside class="profile-card" aria-label="Profile">
                <img class="profile-photo" id="profile-photo" src="img/profile.png" alt="陈奕宏">
            </aside>
        </section>

        <!-- 每个 section 都是一个页面章节；删除章节时，也检查 main.js 里的渲染函数。 -->
        <section class="section" id="profile" aria-labelledby="profile-title">
            <div class="section-heading">
                <h2 id="profile-title"></h2>
            </div>
            <div class="body-copy" id="profile-copy"></div>
        </section>

        <section class="section" id="research-focus" aria-labelledby="research-focus-title">
            <div class="section-heading">
                <h2 id="research-focus-title"></h2>
                <p class="section-copy" id="research-focus-lead"></p>
            </div>
            <div class="research-focus-grid" id="research-focus-list"></div>
        </section>

        <section class="section" id="experience" aria-labelledby="experience-title">
            <div class="section-heading">
                <h2 id="experience-title"></h2>
            </div>
            <div class="timeline" id="experience-list"></div>
        </section>

        <section class="section" id="projects" aria-labelledby="projects-title">
            <div class="section-heading">
                <h2 id="projects-title"></h2>
            </div>
            <div class="projects-list" id="projects-list"></div>
        </section>

        <!-- 荣誉与奖励列表由 content.js 维护，JS 按当前语言生成卡片。 -->
        <section class="section" id="honors" aria-labelledby="honors-title">
            <div class="section-heading">
                <h2 id="honors-title"></h2>
            </div>
            <div class="honor-list" id="honor-list"></div>
        </section>

        <!-- 完整论文列表放在 publications.html，首页只保留入口。 -->
        <section class="section" id="outputs" aria-labelledby="outputs-title">
            <div class="section-heading">
                <h2 id="outputs-title"></h2>
            </div>
            <div class="section-actions">
                <a class="text-button primary" id="outputs-link" href="publications.html"></a>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <span id="footer-text"></span>
    </footer>
</body>
</html>
