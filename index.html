<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="陈奕宏的个人简历主页，聚焦数学建模、数值算法、LLM Agent、科学计算与科研自动化。">
    <title>陈奕宏 | Yihong Chen</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="js/content.js" defer></script>
    <script src="js/main.js" defer></script>
</head>
<body>
    <header class="site-header">
        <a class="brand" href="#top" id="brand">陈奕宏</a>
        <nav class="site-nav" aria-label="Primary navigation">
            <a href="#summary" data-nav="summary">简介</a>
            <a href="#experience" data-nav="experience">经历</a>
            <a href="#work" data-nav="work">项目</a>
            <a href="#publications" data-nav="publications">成果</a>
            <a href="#honors" data-nav="honors">荣誉</a>
            <a href="#contact" data-nav="contact">联系</a>
        </nav>
        <div class="header-actions">
            <button class="text-button" id="language-toggle" type="button">En</button>
            <button class="text-button primary" id="cv-button" type="button">简历</button>
        </div>
    </header>

    <main id="top">
        <section class="hero" aria-labelledby="profile-name">
            <div class="hero-copy">
                <h1 id="profile-name"></h1>
                <p class="lead" id="hero-lead"></p>
                <div class="identity-meta">
                    <p class="profile-role" id="profile-role"></p>
                    <ul class="meta-list" id="profile-lines"></ul>
                </div>
                <div class="tag-list" id="hero-tags" aria-label="Focus areas"></div>
            </div>
            <aside class="profile-card" aria-label="Profile">
                <img class="profile-photo" id="profile-photo" src="img/profile.png" alt="陈奕宏">
            </aside>
        </section>

        <section class="section" id="summary" aria-labelledby="summary-title">
            <div class="section-heading">
                <p class="section-kicker" id="summary-kicker"></p>
                <h2 id="summary-title"></h2>
            </div>
            <div class="summary-grid">
                <div class="body-copy" id="summary-copy"></div>
                <div class="role-panel">
                    <h3 id="target-title"></h3>
                    <ul class="clean-list" id="target-list"></ul>
                </div>
            </div>
        </section>

        <section class="section" id="experience" aria-labelledby="experience-title">
            <div class="section-heading">
                <p class="section-kicker" id="experience-kicker"></p>
                <h2 id="experience-title"></h2>
            </div>
            <div class="timeline" id="experience-list"></div>
        </section>

        <section class="section" id="work" aria-labelledby="work-title">
            <div class="section-heading">
                <p class="section-kicker" id="work-kicker"></p>
                <h2 id="work-title"></h2>
            </div>
            <div class="work-list" id="work-list"></div>
        </section>

        <section class="section" id="publications" aria-labelledby="publications-title">
            <div class="section-heading">
                <p class="section-kicker" id="publications-kicker"></p>
                <h2 id="publications-title"></h2>
                <p class="section-note" id="publications-note"></p>
            </div>
            <div class="publication-block">
                <h3 id="published-title"></h3>
                <ol class="publication-list" id="published-list"></ol>
            </div>
            <div class="publication-block">
                <h3 id="preprint-title"></h3>
                <ol class="publication-list" id="preprint-list"></ol>
            </div>
        </section>

        <section class="section" id="honors" aria-labelledby="honors-title">
            <div class="section-heading">
                <p class="section-kicker" id="honors-kicker"></p>
                <h2 id="honors-title"></h2>
                <p class="section-note" id="honors-note"></p>
            </div>
            <div class="honor-list" id="honor-list"></div>
        </section>

        <section class="section contact-section" id="contact" aria-labelledby="contact-title">
            <div class="section-heading">
                <p class="section-kicker" id="contact-kicker"></p>
                <h2 id="contact-title"></h2>
            </div>
            <div class="contact-layout">
                <div class="body-copy" id="contact-copy"></div>
                <div class="contact-links" id="contact-links"></div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <span id="footer-text"></span>
    </footer>
</body>
</html>
